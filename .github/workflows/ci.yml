name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: opengaebi
          POSTGRES_PASSWORD: password
          POSTGRES_DB: opengaebi
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Test (SQLite)
        run: go test ./... -v -count=1

      - name: Test (PostgreSQL)
        env:
          TEST_DATABASE_URL: postgresql://opengaebi:password@localhost:5432/opengaebi
        run: go test ./internal/db/... -v -run Postgres
